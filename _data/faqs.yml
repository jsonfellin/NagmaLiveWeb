- question: "What is NagmaLive?"
  answer: "NagmaLive is a mobile app designed for practicing Indian classical music. It provides high-quality tabla, lehra (nagma), and metronome accompaniment for tabla players, Kathak dancers, vocalists, and instrumentalists."

- question: "Is NagmaLive free to download?"
  answer: "Yes, NagmaLive is free to download on both iOS and Android. The free version includes essential features, with additional content available through in-app purchases."

- question: "What taals are available?"
  answer: "NagmaLive includes 50+ taals covering both Hindustani and Carnatic traditions, including Teentaal, Jhaptaal, Ektaal, Rupak, Dadra, Keherwa, and many more."

- question: "Can I adjust the tempo?"
  answer: "Yes, you can adjust the tempo (laya) from very slow (vilambit) to very fast (ati drut) with fine-grained BPM control."

- question: "What raags are available for lehra?"
  answer: "NagmaLive offers lehra melodies in 30+ raags including Yaman, Bhairavi, Khamaj, Bilawal, Kafi, Des, Pilu, and many more."

- question: "Can I change the pitch/key?"
  answer: "Yes, you can transpose the pitch to match your preferred key or instrument tuning."

- question: "Does NagmaLive work offline?"
  answer: "Yes, once downloaded, NagmaLive works completely offline. No internet connection is needed to practice."

- question: "Is NagmaLive suitable for beginners?"
  answer: "Absolutely. NagmaLive is designed for all levels — from students just learning their first taal to professional performers preparing for concerts."

- question: "Can I use NagmaLive for Kathak practice?"
  answer: "Yes, NagmaLive includes a dedicated Kathak mode with features specifically designed for dance practice, including adjustable tempo and taal cycles."

- question: "What devices are supported?"
  answer: "NagmaLive is available on iOS (iPhone and iPad) and Android devices."

- question: "How do I save my practice settings?"
  answer: "NagmaLive includes a presets feature that lets you save and recall your favorite practice configurations — including taal, tempo, raag, and pitch settings."

- question: "Can I use NagmaLive for live performances?"
  answer: "Many musicians use NagmaLive for live performances and rehearsals. The app provides reliable, high-quality accompaniment suitable for stage use."

- question: "How do I contact support?"
  answer: "You can reach us at support@nagmalive.com or use the contact form on our About page. We typically respond within 24 hours."
