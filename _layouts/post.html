---
layout: default
---

<article>
  <div class="post-header">
    <div class="container">
      <a href="{{ '/blog/' | relative_url }}" class="post-back">&larr; Back to Blog</a>
      <h1>{{ page.title }}</h1>
      <p class="post-header__meta">
        {{ page.date | date: "%B %d, %Y" }}
        {% if page.author %} &middot; {{ page.author }}{% endif %}
      </p>
    </div>
  </div>
  <div class="container post-content section">
    {{ content }}
  </div>
</article>
