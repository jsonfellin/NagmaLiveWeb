<div class="contact-form" id="contact-form">
  <h3 style="margin-bottom: var(--space-3); text-align: center;">Get in Touch</h3>
  <form id="contact" action="https://formspree.io/f/mlgpaqpk" method="POST">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Your name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" required placeholder="How can we help?"></textarea>
    </div>
    <button type="submit" class="btn btn--primary" style="width: 100%;">Send Message</button>
  </form>
  <div class="form-success" id="form-success">
    Thank you! Your message has been sent. We'll get back to you soon.
  </div>
</div>
