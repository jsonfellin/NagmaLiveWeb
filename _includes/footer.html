<footer class="site-footer" role="contentinfo">
  <div class="container">
    <div class="site-footer__grid">
      <div class="site-footer__brand">
        <span class="site-logo__text">Nagma<span class="text-gold">Live</span></span>
        <p class="site-footer__tagline">The ultimate Indian classical music practice companion.</p>
      </div>
      <div class="site-footer__nav">
        <h4 class="site-footer__heading">Pages</h4>
        <ul>
          {% for item in site.data.navigation %}
          <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
          {% endfor %}
          <li><a href="{{ '/pages/privacy/' | relative_url }}">Privacy Policy</a></li>
        </ul>
      </div>
      <div class="site-footer__social">
        <h4 class="site-footer__heading">Connect</h4>
        <div class="social-links">
          <a href="https://www.facebook.com/nagmalive" aria-label="Facebook" target="_blank" rel="noopener">
            <img src="{{ '/assets/images/facebook@2x.png' | relative_url }}" alt="Facebook" width="24" height="24">
          </a>
          <a href="https://www.youtube.com/@nagmalive" aria-label="YouTube" target="_blank" rel="noopener">
            <img src="{{ '/assets/images/youtube@2x.png' | relative_url }}" alt="YouTube" width="24" height="24">
          </a>
          <a href="https://x.com/nagmalive" aria-label="X (Twitter)" target="_blank" rel="noopener">
            <img src="{{ '/assets/images/twitter@2x.png' | relative_url }}" alt="X" width="24" height="24">
          </a>
        </div>
      </div>
      <div class="site-footer__download">
        <h4 class="site-footer__heading">Download</h4>
        {% include app-store-badges.html %}
      </div>
    </div>
    <div class="site-footer__bottom">
      <p>&copy; {{ 'now' | date: "%Y" }} NagmaLive. All rights reserved.</p>
    </div>
  </div>
</footer>
